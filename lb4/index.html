<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Главная страница</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

    <style>

        .custom-header {
            background-color: #ffffff !important;
            border-bottom: solid blue 2px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
        }
        
        .nav-link {
            transition: color 0.2s ease;
        }
        .nav-link:hover {
            color: blue !important;
        }

        .custom-footer {
            background-color: #f8f9fa;
            border-top: solid blue 2px;
            box-shadow: 0 -2px 8px rgba(0, 0, 0, 0.03);
        }

        .my-column {
            width: 33%;
            padding: 15px;
        }


        .my-column > div {
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .my-column > div:hover {
            transform: translateY(-4px); 
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.1); 
        }

        @media screen and (max-width: 1240px) {
            .my-column { width: 50%; }
        }

        @media screen and (max-width: 768px) {
            .my-column { width: 100%; }
        }
    </style>
</head>

<body>
    <nav class="navbar navbar-expand-lg custom-header">
        <div class="container-fluid">
            <a class="navbar-brand fs-3" href="index.html">Мой сайт</a>
            <div class="collapse navbar-collapse d-flex">
                <div class="navbar-nav ms-auto align-items-center">
                    <a class="nav-link fs-4 text-primary" href="index.html">Главная</a>
                    <a class="nav-link fs-4" href="prod.html">Карточки товаров</a>
                    <a class="nav-link fs-4" href="">О нас</a>
                    <a class="btn btn-primary fs-4 m-3" href="about.html">Написать нам</a>
                </div>
            </div>
        </div>
    </nav>

    <main class="container mt-5">
        <h2 class="text-center">Главная страница</h2>
        
        <div class="row">
            <div class="my-column">
                <div class="bg-primary-subtle p-3 border rounded">
                    Блок 1.
                </div>
            </div>
            
            <div class="my-column">
                <div class="bg-primary p-3 border rounded text-white">
                    Блок 2.
                </div>
            </div>
            
            <div class="my-column">
                <div class="bg-primary-subtle p-3 border rounded">
                    Блок 3.
                </div>
            </div>
        </div>
    </main>

    <footer class="custom-footer py-4 mt-5">
        <div class="container text-center">
            <h5 class="mb-1">Футер</h5>
            <p class="text-muted small mb-0">© 2026 Мой Сайт. Все права защищены. | Поддержка: info@mysite.ru</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>

</html>
